# Database connection - bruger miljřvariabler pĺ Azure, ellers localhost
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/wishlist_db?serverTimezone=UTC}
spring.datasource.username=${JDBC_USERNAME:root}
spring.datasource.password=${JDBC_PASSWORD:igor}

# Driver class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Křr schema.sql og data.sql ved opstart
spring.sql.init.mode=always

# Slĺ Thymeleaf cache fra under udvikling
spring.thymeleaf.cache=false